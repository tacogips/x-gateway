included:
  - Package.swift
  - Sources
  - Tests

excluded:
  - .build
  - tmp

line_length:
  warning: 220
  error: 600
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 1200
  error: 4000

type_body_length:
  warning: 800
  error: 3000

function_body_length:
  warning: 200
  error: 1000

cyclomatic_complexity:
  warning: 30
  error: 120

function_parameter_count:
  warning: 10
  error: 20

identifier_name:
  min_length:
    warning: 1
    error: 1

force_try:
  severity: warning
