version: '3'

vars:
  PROJECT_NAME: x-gateway
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo 0.1.0

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build all Swift products
    cmds:
      - swift build -c release

  build-read:
    desc: Build the Swift read-only command product
    cmds:
      - swift build -c release --product x-gateway-read

  build-write:
    desc: Build the Swift write command product
    cmds:
      - swift build -c release --product x-gateway-write

  test:
    desc: Run Swift smoke tests
    cmds:
      - swift run x-gateway-swift-smoke-tests

  ci:
    desc: Run Swift verification
    cmds:
      - task: build
      - task: test

  clean:
    desc: Clean build and release artifacts
    cmds:
      - rm -rf .build release

  install-read:
    desc: Install only the Swift read-only command
    vars:
      INSTALL_PREFIX: '{{default "/usr/local" .PREFIX}}'
    cmds:
      - swift build -c release --product x-gateway-read
      - mkdir -p "{{.INSTALL_PREFIX}}/bin"
      - install .build/release/x-gateway-read "{{.INSTALL_PREFIX}}/bin/x-gateway-read"

  install-write:
    desc: Install only the Swift write command
    vars:
      INSTALL_PREFIX: '{{default "/usr/local" .PREFIX}}'
    cmds:
      - swift build -c release --product x-gateway-write
      - mkdir -p "{{.INSTALL_PREFIX}}/bin"
      - install .build/release/x-gateway-write "{{.INSTALL_PREFIX}}/bin/x-gateway-write"

  release:clean:
    desc: Clean release artifacts
    cmds:
      - rm -rf release

  release:prepare:
    desc: Run verification before release packaging
    cmds:
      - task: ci

  release:binary:
    desc: Build a local Swift binary archive
    vars:
      RELEASE_DIR: 'release/{{.PROJECT_NAME}}-{{.VERSION}}'
    cmds:
      - task: release:prepare
      - mkdir -p {{.RELEASE_DIR}}/bin
      - install .build/release/x-gateway-read {{.RELEASE_DIR}}/bin/x-gateway-read
      - install .build/release/x-gateway-write {{.RELEASE_DIR}}/bin/x-gateway-write
      - cd release && tar -czf {{.PROJECT_NAME}}-{{.VERSION}}.tar.gz $(basename {{.RELEASE_DIR}})
      - echo "Built release/{{.PROJECT_NAME}}-{{.VERSION}}.tar.gz"

  release:checksums:
    desc: Generate SHA256 checksums for release assets
    cmds:
      - test -d release
      - cd release && shasum -a 256 *.tar.gz > SHA256SUMS.txt
      - echo "Wrote release/SHA256SUMS.txt"

  release:nix:
    desc: Validate Nix flake for release
    cmds:
      - nix flake check

  release:all:
    desc: Build all local release artifacts
    cmds:
      - task: release:clean
      - task: release:binary
      - task: release:checksums

  release:github:
    desc: Publish release assets to GitHub Release
    vars:
      TAG: 'v{{.VERSION}}'
    cmds:
      - gh auth status
      - task: release:nix
      - task: release:all
      - |
        if git rev-parse "{{.TAG}}" >/dev/null 2>&1; then
          echo "Tag {{.TAG}} already exists"
        else
          git tag -a "{{.TAG}}" -m "Release {{.TAG}}"
          git push origin "{{.TAG}}"
          echo "Created and pushed tag {{.TAG}}"
        fi
      - |
        gh release view "{{.TAG}}" >/dev/null 2>&1 || \
          gh release create "{{.TAG}}" --title "{{.PROJECT_NAME}} {{.TAG}}" --generate-notes
      - gh release upload "{{.TAG}}" release/* --clobber
      - echo "Published GitHub release {{.TAG}}"

  release:
    desc: Full Swift release
    cmds:
      - task: release:github
