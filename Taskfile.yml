version: '3'

vars:
  PROJECT_NAME: x-gateway
  TAP_DIR: ../homebrew-tap
  VERSION:
    sh: tr -d '[:space:]' < VERSION 2>/dev/null || git describe --tags --always --dirty 2>/dev/null || echo 0.1.4

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build all Swift products
    cmds:
      - swift build -c release

  build-reader:
    desc: Build the Swift read-only command product
    cmds:
      - swift build -c release --product x-gateway-reader

  build-writer:
    desc: Build the Swift write command product
    cmds:
      - swift build -c release --product x-gateway-writer

  test:
    desc: Run Swift smoke tests
    cmds:
      - swift run x-gateway-swift-smoke-tests

  ci:
    desc: Run Swift verification
    cmds:
      - task: build
      - task: test

  clean:
    desc: Clean build and release artifacts
    cmds:
      - rm -rf .build dist release

  lint:
    desc: Run SwiftLint when available
    cmds:
      - swiftlint

  install-reader:
    desc: Install only the Swift read-only command
    vars:
      INSTALL_PREFIX: '{{default "/usr/local" .PREFIX}}'
    cmds:
      - swift build -c release --product x-gateway-reader
      - mkdir -p "{{.INSTALL_PREFIX}}/bin"
      - install .build/release/x-gateway-reader "{{.INSTALL_PREFIX}}/bin/x-gateway-reader"

  install-writer:
    desc: Install only the Swift write command
    vars:
      INSTALL_PREFIX: '{{default "/usr/local" .PREFIX}}'
    cmds:
      - swift build -c release --product x-gateway-writer
      - mkdir -p "{{.INSTALL_PREFIX}}/bin"
      - install .build/release/x-gateway-writer "{{.INSTALL_PREFIX}}/bin/x-gateway-writer"

  build:homebrew:
    desc: Build Homebrew formula archives containing read and write commands
    cmds:
      - scripts/build-homebrew-release.sh {{.CLI_ARGS}}

  homebrew:formula-reader:
    desc: Render Formula/x-gateway-reader.rb from dist/homebrew checksums
    cmds:
      - |
        set -euo pipefail
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "usage: task homebrew:formula-reader -- <version>" >&2
          exit 2
        fi
        scripts/render-homebrew-formula.sh "{{.CLI_ARGS}}" reader "Formula/x-gateway-reader.rb"

  homebrew:formula-writer:
    desc: Render Formula/x-gateway-writer.rb from dist/homebrew checksums
    cmds:
      - |
        set -euo pipefail
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "usage: task homebrew:formula-writer -- <version>" >&2
          exit 2
        fi
        scripts/render-homebrew-formula.sh "{{.CLI_ARGS}}" writer "Formula/x-gateway-writer.rb"

  homebrew:tap-formula-reader:
    desc: Render the read-only formula into the default sibling Homebrew tap checkout
    cmds:
      - |
        set -euo pipefail
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "usage: task homebrew:tap-formula-reader -- <version>" >&2
          exit 2
        fi
        scripts/render-homebrew-formula.sh "{{.CLI_ARGS}}" reader "{{.TAP_DIR}}/Formula/x-gateway-reader.rb"

  homebrew:tap-formula-writer:
    desc: Render the write formula into the default sibling Homebrew tap checkout
    cmds:
      - |
        set -euo pipefail
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "usage: task homebrew:tap-formula-writer -- <version>" >&2
          exit 2
        fi
        scripts/render-homebrew-formula.sh "{{.CLI_ARGS}}" writer "{{.TAP_DIR}}/Formula/x-gateway-writer.rb"
